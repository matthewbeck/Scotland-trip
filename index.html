  <meta name="theme-color" content="#131313">
  <title>Scotland & Netherlands 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #131313;
      --surface:   #1c1b1b;
      --card:      #2a2a2a;
      --card-hi:   #353534;
      --on-bg:     #e5e2e1;
      --on-muted:  #c4c7c7;
      --on-dim:    #8e9192;
      --orange:    #ffb59c;
      --orange-hot:#fa5c1c;
      --blue:      #adc7ff;
      --primary:   #c6c6c9;
      --outline:   #444748;
    }

    html, body {
      background: var(--bg);
      color: var(--on-bg);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      -webkit-text-size-adjust: 100%;
    }

    /* ── HEADER ── */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: env(safe-area-inset-top, 0px) 20px 0;
      background: rgba(19,19,19,0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0 14px;
    }

    .header-wordmark {
      font-family: 'Epilogue', sans-serif;
      font-weight: 900;
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--primary);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .today-btn {
      font-family: inherit;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--orange-hot);
      padding: 5px 10px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s ease;
    }
    .today-btn:active { opacity: 0.7; }
    .today-btn[hidden] { display: none; }

    .header-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--orange);
      background: rgba(255,181,156,0.1);
      padding: 4px 10px;
      border-radius: 100px;
    }

    /* ── HERO ── */
    .hero {
      margin: 0 16px 32px;
      border-radius: 20px;
      overflow: hidden;
      background: linear-gradient(135deg, #101214 0%, rgba(255,181,156,0.08) 100%);
      padding: 32px 28px 28px;
      position: relative;
    }

    .hero::after {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(255,181,156,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 10px;
    }

    .hero-title {
      font-family: 'Epilogue', sans-serif;
      font-weight: 900;
      font-size: 42px;
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--on-bg);
      margin-bottom: 16px;
    }

    .hero-title span { color: var(--primary); }

    .hero-desc {
      font-size: 13px;
      line-height: 1.6;
      color: var(--on-dim);
      max-width: 260px;
    }

    .hero-meta {
      display: flex;
      gap: 20px;
      margin-top: 24px;
    }

    .hero-stat { }
    .hero-stat-val {
      font-family: 'Epilogue', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--on-bg);
      letter-spacing: -0.02em;
    }
    .hero-stat-label {
      font-size: 10px;
      color: var(--on-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ── ALERTS ── */
    .alerts-section {
      padding: 0 16px;
      margin-bottom: 32px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .alert {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 12px;
      line-height: 1.5;
      font-weight: 500;
    }

    .alert-warn {
      background: rgba(250,92,28,0.08);
      color: var(--orange);
    }

    .alert-info {
      background: rgba(173,199,255,0.06);
      color: var(--blue);
    }

    .alert-icon {
      font-size: 14px;
      margin-top: 1px;
      flex-shrink: 0;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      padding: 0 20px;
      margin-bottom: 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--on-dim);
    }

    /* ── TIMELINE ── */
    .timeline {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 64px;
    }

    /* ── SEGMENT CARD ── */
    .seg {
      border-radius: 16px;
      overflow: hidden;
      background: var(--surface);
      transition: background 0.15s;
    }

    .seg.is-open { background: var(--card); }

    .seg-btn {
      width: 100%;
      background: none;
      border: none;
      cursor: pointer;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
    }

    .seg-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .seg-info { flex: 1; min-width: 0; }

    .seg-eyebrow {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .seg-name {
      font-family: 'Epilogue', sans-serif;
      font-size: 15px;
      font-weight: 800;
      color: var(--on-bg);
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .seg-sub {
      font-size: 11px;
      color: var(--on-dim);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .seg-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .warn-pip {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--orange-hot);
      flex-shrink: 0;
    }

    .chevron {
      font-size: 10px;
      color: var(--outline);
      transition: transform 0.2s;
      display: inline-block;
    }
    .chevron.open { transform: rotate(180deg); color: var(--on-dim); }

    /* ── SEGMENT BODY ── */
    .seg-body {
      padding: 0 16px 20px 70px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .seg-divider {
      height: 1px;
      background: rgba(68,71,72,0.4);
      margin: 0 16px 16px 70px;
    }

    .detail-row {
      display: flex;
      gap: 16px;
      font-size: 12px;
      line-height: 1.4;
    }

    .d-label {
      width: 76px;
      flex-shrink: 0;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--on-dim);
      padding-top: 1px;
    }

    .d-val {
      color: var(--on-muted);
      flex: 1;
      font-weight: 500;
    }

    .qr-block {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 0 4px 0;
      }
      .qr-img {
        width: 80px;
        height: 80px;
        border-radius: 6px;
        background: white;
        padding: 4px;
      }
      .qr-label {
        font-size: 11px;
        color: var(--text-muted);
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      .email-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--blue);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── TYPE COLORS ── */
    .type-flight .seg-icon  { background: rgba(173,199,255,0.1); color: var(--blue); }
    .type-flight .seg-eyebrow { color: var(--blue); }

    .type-train .seg-icon   { background: rgba(198,198,201,0.08); color: var(--primary); }
    .type-train .seg-eyebrow { color: var(--primary); }

    .type-ferry .seg-icon   { background: rgba(173,199,255,0.08); color: var(--blue); }
    .type-ferry .seg-eyebrow { color: var(--blue); }

    .type-car .seg-icon     { background: rgba(255,181,156,0.1); color: var(--orange); }
    .type-car .seg-eyebrow  { color: var(--orange); }

    .type-stay .seg-icon    { background: rgba(255,181,156,0.08); color: var(--orange); }
    .type-stay .seg-eyebrow { color: var(--orange); }

    .type-explore .seg-icon    { background: rgba(173,199,255,0.08); color: var(--blue); }
    .type-explore .seg-eyebrow { color: var(--blue); }

    /* ── EXPLORE CARDS ── */
    .explore-section { display: flex; flex-direction: column; gap: 6px; }

    .explore-cat-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--on-dim);
      margin-top: 8px;
      margin-bottom: 2px;
    }

    .explore-item {
      background: var(--card-hi);
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .explore-name {
      font-family: 'Epilogue', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--on-bg);
      letter-spacing: -0.01em;
    }

    .explore-meta {
      font-size: 10.5px;
      color: var(--on-dim);
      line-height: 1.4;
    }

    .explore-tag {
      display: inline-block;
      font-size: 9px;

alerts.forEach(a => {
  const div = document.createElement('div');
  div.className = `alert alert-${a.type === 'warning' ? 'warn' : 'info'}`;
  div.innerHTML = `<span class="alert-icon">${a.type === 'warning' ? '▲' : '→'}</span><span>${a.text}</span>`;
  alertsEl.appendChild(div);
});

// Render timeline
const timelineEl = document.getElementById('timeline');
let openId = null;

function render() {
  timelineEl.innerHTML = '';
  segments.forEach(seg => {
    const isOpen = openId === seg.id;
    const wrap = document.createElement('div');
    wrap.className = `seg type-${seg.type}${isOpen ? ' is-open' : ''}`;

    const detailsHTML = seg.details ? seg.details.map(d =>
      `<div class="detail-row"><span class="d-label">${d.label}</span><span class="d-val">${d.value}</span></div>`
    ).join('') : '';

    let exploreHTML = '';
    if (seg.explore) {
      exploreHTML = `<div class="explore-section">` + seg.explore.map(cat => `
        <div class="explore-cat-label">${cat.cat}</div>
        ${cat.items.map(item => `
          <div class="explore-item">
            <div class="explore-name">${item.name}</div>
            <div class="explore-meta">${item.meta}</div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:5px;">
              <span class="explore-tag tag-${item.tag}">${item.tag}</span>
              ${item.maps ? `<a href="${item.maps}" target="_blank" rel="noopener noreferrer" style="font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--on-dim);text-decoration:none;">↗ Maps</a>` : ''}
            </div>
          </div>`).join('')}
      `).join('') + `</div>`;
    }

    const emailHTML = seg.emailLink
      ? `<a href="${seg.emailLink}" target="_blank" rel="noopener noreferrer" class="email-link">✉ View confirmation</a>`
      : '';

    const qrHTML = seg.qrUrl
      ? `<div class="qr-block"><img src="${seg.qrUrl}" alt="QR Code" class="qr-img" /><span class="qr-label">Scan to open ticket</span></div>`
      : '';

    const ticketsHTML = seg.tickets
      ? seg.tickets.map(t =>
          `<div class="qr-block"><img src="${t.image}" alt="QR ticket" class="qr-img" /><span class="qr-label">${t.passenger}</span></div>`
        ).join('')
      : '';

    const bodyHTML = isOpen ? `
      <div class="seg-divider"></div>
      <div class="seg-body">
        ${detailsHTML}${exploreHTML}${ticketsHTML}
        ${emailHTML}
      </div>` : '';

    wrap.innerHTML = `
      <button class="seg-btn" data-id="${seg.id}">
        <div class="seg-icon">${seg.icon}</div>
        <div class="seg-info">
          <div class="seg-eyebrow">${seg.eyebrow}</div>
          <div class="seg-name">${seg.title}</div>
          <div class="seg-sub">${seg.sub}</div>
        </div>
        <div class="seg-right">
          ${seg.warning ? '<div class="warn-pip"></div>' : ''}
          <div class="chevron${isOpen ? ' open' : ''}">▼</div>
        </div>
      </button>
      ${bodyHTML}
    `;
    timelineEl.appendChild(wrap);
  });
}

timelineEl.addEventListener('click', e => {
  const btn = e.target.closest('.seg-btn');
  if (!btn) return;
  openId = openId === btn.dataset.id ? null : btn.dataset.id;
  render();
});

// "Today" button — opens and scrolls to the segment matching today's date.
function getCurrentSegmentId() {
  const d = new Date();
  const today = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  // Prefer an active stay (covers most days of the trip)
  const stay = segments.find(s => s.type === 'stay' && s.start && s.start <= today && today <= (s.end || s.start));
  if (stay) return stay.id;
  // Otherwise: an event happening exactly today
  const todayEvent = segments.find(s => s.start === today);
  if (todayEvent) return todayEvent.id;
  // Otherwise: next upcoming dated segment
  const upcoming = segments.find(s => s.start && s.start > today);
  return upcoming ? upcoming.id : null;
}

const todayBtn = document.getElementById('today-btn');
todayBtn.addEventListener('click', () => {
  const id = getCurrentSegmentId();
  if (!id) return;
  openId = id;
  render();
  requestAnimationFrame(() => {
    const el = document.querySelector(`.seg-btn[data-id="${id}"]`);
    if (el) el.closest('.seg').scrollIntoView({ behavior: 'smooth', block: 'center' });
  });
});
// Hide the button if there's no current/upcoming segment to jump to (trip ended)
if (!getCurrentSegmentId()) todayBtn.hidden = true;

render();
</script>
